<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f8f9fb">
    <title>持仓收益</title>
    <link rel="stylesheet" href="/styles.css?v=20260626-4">
  </head>
  <body>
    <main class="shell" aria-live="polite">
      <header class="topbar">
        <div class="actions">
          <button class="text-button" id="saveButton" type="button">
            保存截图
          </button>
          <button class="text-button" id="refreshButton" type="button">
            刷新行情
          </button>
        </div>
      </header>

      <section class="hero-card">
        <div class="hero-label">累计收益</div>
        <div class="hero-value" id="totalProfit">--</div>
        <div class="hero-meta">
          <span id="totalRate">--</span>
          <span id="dayProfit">今日 --</span>
        </div>
      </section>

      <section class="summary-grid" aria-label="组合汇总">
        <article class="metric-card">
          <span>当前市值</span>
          <strong id="marketValue">--</strong>
        </article>
        <article class="metric-card">
          <span>投入成本</span>
          <strong id="costAmount">--</strong>
        </article>
      </section>

      <section class="visual-panel" aria-label="收益占比">
        <div class="panel-heading">
          <span>市值结构</span>
          <strong id="visualRatio">--</strong>
        </div>
        <div class="bar-track" id="allocationBars"></div>
      </section>

      <section class="holdings" id="holdings" aria-label="持仓明细"></section>

      <section class="status-panel">
        <div>
          <strong id="statusText">正在读取行情...</strong>
          <span id="sourceText">--</span>
        </div>
        <div class="refresh-pill">
          <span id="countdown">30s</span>
        </div>
      </section>

      <p class="risk-note">行情可能存在延迟；收益仅按页面显示价格估算，最终以券商成交和持仓为准。</p>
    </main>

    <div class="celebration" id="celebration" hidden>
      <canvas class="confetti-canvas" id="confettiCanvas" aria-hidden="true"></canvas>
      <div class="celebration-card" role="dialog" aria-modal="true" aria-labelledby="celebrationTitle">
        <button class="celebration-close" id="celebrationClose" type="button" title="关闭">
          <span aria-hidden="true">×</span>
          <span class="sr-only">关闭</span>
        </button>
        <span class="celebration-kicker">今日盈利</span>
        <h2 id="celebrationTitle">恭喜发财了！</h2>
        <p id="celebrationAmount">--</p>
      </div>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script type="module" src="/app.js?v=20260626-14"></script>
  </body>
</html>
